<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="MultiNote - 双人实时协作手写笔记本" />
    <title>MultiNote</title>
  </head>
  <body class="bg-[#F5F5F5] dark:bg-[#0D0D0D]">
    <div id="root"></div>
    <!-- 全局错误捕获 — 在所有 JS 之前安装 -->
    <script>
      window.__caughtErrors = [];
      function showErrorBox(source, msg, stack) {
        var old = document.getElementById('global-error-box');
        if (old) old.remove();
        var box = document.createElement('div');
        box.id = 'global-error-box';
        box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#dc2626;color:#fff;padding:16px 20px;font-family:monospace;font-size:13px;line-height:1.6;white-space:pre-wrap;max-height:50vh;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.3)';
        box.textContent = '[' + source + '] ' + msg + '\n\n' + (stack || '(no stack)');
        document.body.appendChild(box);
        window.__caughtErrors.push({source:source, msg:msg, stack:stack, time:new Date().toISOString()});
      }
      // window.onerror 捕获同步错误
      window.onerror = function(msg, file, line, col, error) {
        var stack = (error && error.stack) || ('at ' + file + ':' + line + ':' + col);
        showErrorBox('window.onerror', String(msg), stack);
        return false; // 允许浏览器也记录
      };
      // unhandledrejection 捕获 Promise 错误
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        showErrorBox('unhandledrejection', reason && reason.message ? reason.message : String(reason), reason && reason.stack ? reason.stack : '');
      });
      console.log('[debug v6] index.html error handlers installed | build: 582b5e3');
      // 版本标签（底部醒目横条）
      var vBadge = document.createElement('div');
      vBadge.id = 'version-badge';
      vBadge.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:99998;background:#A78BFA;color:#fff;padding:6px 16px;font-family:monospace;font-size:13px;text-align:center;font-weight:bold;letter-spacing:0.1em';
      vBadge.textContent = '🔗 MultiNote | debug-582b5e3 | 2026-06-01';
      document.body.appendChild(vBadge);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

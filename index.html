<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="MultiNote - 双人实时协作手写笔记本" />
    <title>MultiNote</title>
    <script type="module" crossorigin src="/assets/index-QtVAPTo1.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Cf3tSydi.css">
  </head>
  <body class="bg-[#F5F5F5] dark:bg-[#0D0D0D]">
    <div id="root"></div>
    <!-- 全局错误捕获 — 在所有 JS 之前安装 -->
    <script>
      window.__caughtErrors = [];
      function showErrorBox(source, msg, stack) {
        var old = document.getElementById('global-error-box');
        if (old) old.remove();
        var box = document.createElement('div');
        box.id = 'global-error-box';
        box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#dc2626;color:#fff;padding:12px 20px;font-family:monospace;font-size:12px;line-height:1.5;white-space:pre-wrap;max-height:40vh;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.3);cursor:pointer';
        box.textContent = '[' + source + '] ' + msg + '\n\n' + (stack || '(no stack)');
        box.title = '点击关闭';
        box.onclick = function() { box.remove(); };
        document.body.appendChild(box);
        window.__caughtErrors.push({source:source, msg:msg, stack:stack, time:new Date().toISOString()});
      }
      window.onerror = function(msg, file, line, col, error) {
        var stack = (error && error.stack) || ('at ' + file + ':' + line + ':' + col);
        showErrorBox('window.onerror', String(msg), stack);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var reason = event.reason;
        showErrorBox('unhandledrejection', reason && reason.message ? reason.message : String(reason), reason && reason.stack ? reason.stack : '');
      });
    </script>
  </body>
</html>
